<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0e0e0e"/>
  <!-- Compass ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c8a03c" stroke-width="1.5"/>
  <!-- Compass points -->
  <!-- North (gold) -->
  <polygon points="16,4 18.5,13 16,11 13.5,13" fill="#c8a03c"/>
  <!-- South (dimmer gold) -->
  <polygon points="16,28 18.5,19 16,21 13.5,19" fill="#8a6a1a"/>
  <!-- East -->
  <polygon points="28,16 19,13.5 21,16 19,18.5" fill="#c8a03c"/>
  <!-- West -->
  <polygon points="4,16 13,13.5 11,16 13,18.5" fill="#8a6a1a"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#c8a03c"/>
</svg>
