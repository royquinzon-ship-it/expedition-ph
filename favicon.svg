<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0c0c0c"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#c8a03c" stroke-width="1.2"/>

  <!-- Middle ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#c8a03c" stroke-width="0.6" opacity="0.55"/>

  <!-- Intercardinal spikes: NE, SE, SW, NW (mid-gold) -->
  <polygon points="24.5,7.5 19.1,10.7 16,16 21.3,12.9" fill="#a07828"/>
  <polygon points="24.5,24.5 21.3,19.1 16,16 19.1,21.3" fill="#a07828"/>
  <polygon points="7.5,24.5 12.9,21.3 16,16 10.7,19.1" fill="#a07828"/>
  <polygon points="7.5,7.5 10.7,12.9 16,16 12.9,10.7" fill="#a07828"/>

  <!-- Cardinal spikes: N + E bright gold, S + W dim -->
  <polygon points="16,2 17.8,9 16,16 14.2,9"   fill="#c8a03c"/>
  <polygon points="30,16 23,14.2 16,16 23,17.8" fill="#c8a03c"/>
  <polygon points="16,30 14.2,23 16,16 17.8,23" fill="#6a4808"/>
  <polygon points="2,16 9,17.8 16,16 9,14.2"   fill="#6a4808"/>

  <!-- Center ring + dot -->
  <circle cx="16" cy="16" r="2.5" fill="none" stroke="#c8a03c" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="1.2" fill="#c8a03c"/>
</svg>
